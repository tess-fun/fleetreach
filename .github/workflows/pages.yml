name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs-src/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Build the mdBook docs into site/docs (book.toml sets build-dir = ../site/docs).
      - name: build docs (mdBook)
        run: |
          curl -sSfL https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C /usr/local/bin mdbook
          mdbook build docs-src
      - uses: actions/configure-pages@v5
      # The landing page (site/index.html) plus the built mdBook docs (site/docs).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
